# Prefix
unbind C-b
set -g prefix C-a
bind C-a send-prefix

# Shell + terminal capabilities
set -g default-shell /usr/bin/zsh
set -g default-command "/usr/bin/zsh -l"
set -g default-terminal "tmux-256color"
set -ag terminal-features ",xterm-256color:RGB"
set -ag terminal-features ",tmux-256color:RGB"
set -g focus-events on
set -g set-clipboard on

# Responsiveness + scrollback
set -s escape-time 10
set -g history-limit 100000

# Window/pane indexing
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# Interaction
set -g mouse on
setw -g mode-keys vi
bind c new-window -c "#{pane_current_path}"
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
bind r source-file ~/.tmux.conf \; display-message "tmux reloaded"

# Copy mode with cross-platform clipboard support
bind-key -T copy-mode-vi v send-keys -X begin-selection
bind-key -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "~/.local/bin/omega-copy"
bind-key -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "~/.local/bin/omega-copy"
bind-key -T copy-mode MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.local/bin/omega-copy"
bind-key -T copy-mode-vi MouseDragEnd1Pane send-keys -X copy-pipe-and-cancel "~/.local/bin/omega-copy"

# Status line
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=default,fg=colour250"
set -g status-left-length 30
set -g status-right-length 80
set -g status-left "#[bold] #S "
set -g status-right "#{?client_prefix,#[fg=colour203]PREFIX ,}#[fg=colour245]%Y-%m-%d %H:%M "
set -g message-style "fg=colour231,bg=colour31"
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[bold] #I:#W "
